# .github/workflows/ci.yml
# Triggers on every push and pull request — builds the solution and runs all unit tests.

name: CI - Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup .NET 9 (for Gateway)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore SpazaSure.Backend.sln

      - name: Build solution
        run: dotnet build SpazaSure.Backend.sln --no-restore -c Release

      - name: Run unit tests
        run: >
          dotnet test tests/SpazaSure.Tests/SpazaSure.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
