name: Build Mobile Apps (Android APK + iOS IPA)

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    branches: [qa, main]
    paths:
      - 'spazasure_app/**'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - name: Get dependencies
        working-directory: spazasure_app
        run: flutter pub get

      - name: Decode Keystore
        working-directory: spazasure_app/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > spazasure-release.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=spazasure" >> key.properties
          echo "storeFile=spazasure-release.jks" >> key.properties

      - name: Build APK
        working-directory: spazasure_app
        run: flutter build apk --release

      - name: Build App Bundle
        working-directory: spazasure_app
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpazaSure-Android-APK
          path: spazasure_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SpazaSure-Android-AAB
          path: spazasure_app/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - name: Get dependencies
        working-directory: spazasure_app
        run: flutter pub get

      - name: Build iOS (No Signing)
        working-directory: spazasure_app
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        working-directory: spazasure_app
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r SpazaSure.ipa Payload
          mv SpazaSure.ipa ../

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpazaSure-iOS-IPA
          path: spazasure_app/build/ios/SpazaSure.ipa
