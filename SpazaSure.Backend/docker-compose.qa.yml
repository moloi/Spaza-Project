# docker-compose.qa.yml
# Run: docker compose -f docker-compose.qa.yml up -d
# Requires: .env.qa file at repo root with secrets

version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: spazasure-qa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       spazasure_qa
      POSTGRES_USER:     spazasure_qa_user
      POSTGRES_PASSWORD: ${QA_DB_PASSWORD}
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spazasure_qa_user -d spazasure_qa"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: spazasure-qa-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: spazasure
      RABBITMQ_DEFAULT_PASS: ${QA_RABBITMQ_PASSWORD:-SpazaRabbitQA2026}
    ports:
      - "15672:15672"
    volumes:
      - qa_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: src/Services/SpazaSure.AuthService/Dockerfile
    container_name: spazasure-qa-auth
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:               QA
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure_qa;Username=spazasure_qa_user;Password=${QA_DB_PASSWORD}"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${QA_RABBITMQ_PASSWORD:-SpazaRabbitQA2026}
      Jwt__Secret:                          ${QA_JWT_SECRET}
      Jwt__AccessExpiryMinutes:             "60"
      Jwt__RefreshExpiryDays:               "30"
      AfricasTalking__Username:             sandbox
      AfricasTalking__ApiKey:               ${QA_AT_API_KEY}
      AfricasTalking__Sandbox:              "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: src/Services/SpazaSure.ProductService/Dockerfile
    container_name: spazasure-qa-product
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:               QA
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure_qa;Username=spazasure_qa_user;Password=${QA_DB_PASSWORD}"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${QA_RABBITMQ_PASSWORD:-SpazaRabbitQA2026}
      Jwt__Secret:                          ${QA_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: src/Services/SpazaSure.OrderService/Dockerfile
    container_name: spazasure-qa-order
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:               QA
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure_qa;Username=spazasure_qa_user;Password=${QA_DB_PASSWORD}"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${QA_RABBITMQ_PASSWORD:-SpazaRabbitQA2026}
      Jwt__Secret:                          ${QA_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: src/Services/SpazaSure.UserService/Dockerfile
    container_name: spazasure-qa-user
    restart: unless-stopped
    volumes:
      - qa_uploads:/app/uploads
    environment:
      ASPNETCORE_ENVIRONMENT:               QA
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure_qa;Username=spazasure_qa_user;Password=${QA_DB_PASSWORD}"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${QA_RABBITMQ_PASSWORD:-SpazaRabbitQA2026}
      Jwt__Secret:                          ${QA_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: src/Services/SpazaSure.NotificationService/Dockerfile
    container_name: spazasure-qa-notification
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:               QA
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure_qa;Username=spazasure_qa_user;Password=${QA_DB_PASSWORD}"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${QA_RABBITMQ_PASSWORD:-SpazaRabbitQA2026}
      Jwt__Secret:                          ${QA_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/SpazaSure.Gateway/Dockerfile
    container_name: spazasure-qa-gateway
    restart: unless-stopped
    ports:
      - "5181:5181"
    environment:
      ASPNETCORE_ENVIRONMENT: QA
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - notification-service

volumes:
  qa_postgres_data:
  qa_uploads:
  qa_rabbitmq_data:
