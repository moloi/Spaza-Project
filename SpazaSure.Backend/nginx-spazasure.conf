server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/spazasure;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:5181;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
    }

    location /uploads/ {
        alias /var/lib/docker/volumes/spazasure-backend_qa_uploads/_data/;
        expires 1h;
        add_header 'Cache-Control' 'public, no-transform';
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /swagger { proxy_pass http://127.0.0.1:5181; proxy_set_header Host $host; }
    location /svc/auth/ { proxy_pass http://127.0.0.1:5001/; }
    location /svc/product/ { proxy_pass http://127.0.0.1:5002/; }
    location /svc/order/ { proxy_pass http://127.0.0.1:5003/; }
    location /svc/user/ { proxy_pass http://127.0.0.1:5005/; }

    location /assets { expires 1y; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
