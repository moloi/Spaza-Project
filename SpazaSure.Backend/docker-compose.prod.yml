# docker-compose.prod.yml
# Run: docker compose -f docker-compose.prod.yml up -d
# Requires: .env.prod file at repo root (never commit this file)

version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: spazasure-prod-db
    restart: always
    environment:
      POSTGRES_DB:       spazasure
      POSTGRES_USER:     spazasure_prod_user
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spazasure_prod_user -d spazasure"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: spazasure-prod-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: spazasure
      RABBITMQ_DEFAULT_PASS: ${PROD_RABBITMQ_PASSWORD}
    volumes:
      - prod_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    image: ${REGISTRY}/spazasure-auth:${IMAGE_TAG:-latest}
    container_name: spazasure-prod-auth
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure;Username=spazasure_prod_user;Password=${PROD_DB_PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${PROD_RABBITMQ_PASSWORD}
      Jwt__Secret:                          ${PROD_JWT_SECRET}
      Jwt__AccessExpiryMinutes:             "30"
      Jwt__RefreshExpiryDays:               "14"
      AfricasTalking__Username:             ${PROD_AT_USERNAME}
      AfricasTalking__ApiKey:               ${PROD_AT_API_KEY}
      AfricasTalking__Sandbox:              "false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  product-service:
    image: ${REGISTRY}/spazasure-product:${IMAGE_TAG:-latest}
    container_name: spazasure-prod-product
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure;Username=spazasure_prod_user;Password=${PROD_DB_PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${PROD_RABBITMQ_PASSWORD}
      Jwt__Secret:                          ${PROD_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    image: ${REGISTRY}/spazasure-order:${IMAGE_TAG:-latest}
    container_name: spazasure-prod-order
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure;Username=spazasure_prod_user;Password=${PROD_DB_PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${PROD_RABBITMQ_PASSWORD}
      Jwt__Secret:                          ${PROD_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    image: ${REGISTRY}/spazasure-user:${IMAGE_TAG:-latest}
    container_name: spazasure-prod-user
    restart: always
    volumes:
      - prod_uploads:/app/uploads
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure;Username=spazasure_prod_user;Password=${PROD_DB_PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${PROD_RABBITMQ_PASSWORD}
      Jwt__Secret:                          ${PROD_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    image: ${REGISTRY}/spazasure-notification:${IMAGE_TAG:-latest}
    container_name: spazasure-prod-notification
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT:               Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=spazasure;Username=spazasure_prod_user;Password=${PROD_DB_PASSWORD};SSL Mode=Require;Trust Server Certificate=true"
      RabbitMQ__Host:                       rabbitmq
      RabbitMQ__Username:                   spazasure
      RabbitMQ__Password:                   ${PROD_RABBITMQ_PASSWORD}
      Jwt__Secret:                          ${PROD_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    image: ${REGISTRY}/spazasure-gateway:${IMAGE_TAG:-latest}
    container_name: spazasure-prod-gateway
    restart: always
    ports:
      - "80:5181"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - notification-service

volumes:
  prod_postgres_data:
  prod_uploads:
  prod_rabbitmq_data:
