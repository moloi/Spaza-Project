name: Backend - Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'SpazaSure.Backend/**'
      - '!SpazaSure.Backend/**.md'

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SpazaSure.Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore SpazaSure.Backend.sln
      - run: dotnet build SpazaSure.Backend.sln --no-restore -c Release
      - run: dotnet test tests/SpazaSure.Tests/SpazaSure.Tests.csproj --no-build -c Release

  build-and-push:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./SpazaSure.Backend
          file: SpazaSure.Backend/src/Services/SpazaSure.AuthService/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spazasure-auth:prod-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/spazasure-auth:latest
      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./SpazaSure.Backend
          file: SpazaSure.Backend/src/Services/SpazaSure.ProductService/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spazasure-product:prod-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/spazasure-product:latest
      - name: Build and push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./SpazaSure.Backend
          file: SpazaSure.Backend/src/Services/SpazaSure.OrderService/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spazasure-order:prod-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/spazasure-order:latest
      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./SpazaSure.Backend
          file: SpazaSure.Backend/src/Services/SpazaSure.UserService/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spazasure-user:prod-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/spazasure-user:latest
      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./SpazaSure.Backend
          file: SpazaSure.Backend/src/Gateway/SpazaSure.Gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spazasure-gateway:prod-${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/spazasure-gateway:latest

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: SpazaSure.Backend/docker-compose.prod.yml
          target: /opt/spazasure/
          strip_components: 1
      - name: Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/spazasure
            printf "PROD_DB_PASSWORD=%s\nPROD_JWT_SECRET=%s\nPROD_AT_USERNAME=%s\nPROD_AT_API_KEY=%s\nREGISTRY=ghcr.io/${{ github.repository_owner }}\nIMAGE_TAG=latest\n" \
              "${{ secrets.PROD_DB_PASSWORD }}" "${{ secrets.PROD_JWT_SECRET }}" "${{ secrets.PROD_AT_USERNAME }}" "${{ secrets.PROD_AT_API_KEY }}" > .env.prod
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            rm -f .env.prod
            echo "Backend Production deployment complete"
