name: Supplier Portal - Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'supplier-portal/**'
      - '!supplier-portal/**.md'

concurrency:
  group: supplier-portal-production
  cancel-in-progress: false

jobs:
  build:
    name: Build Frontend (Production)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supplier-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: supplier-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build for Production
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: supplier-portal-prod-build
          path: supplier-portal/dist/
          retention-days: 30

  deploy:
    name: Deploy to Production Server
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: supplier-portal-prod-build
          path: dist/

      - name: Deploy to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/spazasure-supplier"
          strip_components: 1
          overwrite: true
          rm: true

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            systemctl restart nginx
            echo "Supplier Portal - Production deployment complete"
