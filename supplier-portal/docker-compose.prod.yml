version: "3.8"

# Production override - run with:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  supplier-portal:
    build:
      args:
        BUILD_MODE: production
    ports:
      - "80:80"
      - "443:443"
    restart: always

  # Backend API production configuration
  backend-api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=SpazaSure;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASS}
      - RabbitMQ__VirtualHost=spazasure_production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    restart: always

  # RabbitMQ production configuration
  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-spazasure_prod}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: spazasure_production
    ports:
      - "5672:5672"
      # Management UI - restrict in production or remove entirely
      - "15672:15672"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    restart: always

  # SQL Server production configuration
  mssql:
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Express
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"
    restart: always
