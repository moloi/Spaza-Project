name: Supplier Portal - Release Validation

on:
  push:
    branches: [release]
    paths:
      - 'supplier-portal/**'
      - '!supplier-portal/**.md'

concurrency:
  group: supplier-portal-release
  cancel-in-progress: true

jobs:
  validate:
    name: Build & Validate for Production Readiness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supplier-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: supplier-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build for Production (validation)
        run: npm run build:prod

      - name: Verify build output
        run: |
          if [ -d "dist" ]; then
            echo "Build passed - ready for production"
            du -sh dist/
          else
            echo "Build failed"
            exit 1
          fi
