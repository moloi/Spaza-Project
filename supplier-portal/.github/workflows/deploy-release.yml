name: Supplier Portal - Deploy to Release (Staging)

on:
  push:
    branches: [release]
    paths:
      - 'supplier-portal/**'
      - '!supplier-portal/**.md'

concurrency:
  group: supplier-portal-release
  cancel-in-progress: true

jobs:
  build:
    name: Build Frontend (Release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supplier-portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: supplier-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build for Production (release validation)
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: supplier-portal-release-build
          path: supplier-portal/dist/
          retention-days: 14

  deploy:
    name: Deploy to Staging Server
    needs: build
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: supplier-portal-release-build
          path: dist/

      - name: Deploy to Release Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.RELEASE_HOST }}
          username: ${{ secrets.RELEASE_USERNAME }}
          key: ${{ secrets.RELEASE_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/spazasure-supplier"
          strip_components: 1
          overwrite: true
          rm: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RELEASE_HOST }}
          username: ${{ secrets.RELEASE_USERNAME }}
          key: ${{ secrets.RELEASE_SSH_KEY }}
          script: |
            systemctl restart nginx
            echo "Supplier Portal - Release/Staging deployment complete"
            echo "Timestamp: $(date)"
