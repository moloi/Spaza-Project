name: spazasure_app
description: SpazaSure - Connecting suppliers, spaza shops, and consumers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  provider: ^6.1.2
  go_router: ^14.8.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  badges: ^3.1.2
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
